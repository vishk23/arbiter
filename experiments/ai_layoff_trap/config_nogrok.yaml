      implies no output change from automation, while the general CES case allows
      output gains with diminishing returns, raising scope questions about how essential
      the baseline normalization is.


      Additional conceptual tensions in the formal apparatus. C99 versus C100: competition
      worsens the wedge while monopoly internalizes it, which is intentionally contrary
      to standard welfare intuition that competition disciplines firms and monopoly
      is distortionary. C332 versus C95: C332 says ℓ > s is necessary for over-automation,
      but C95 shows a positive over-automation wedge can exist when ℓ < s provided
      s < k + ℓ/N; the likely issue is unqualified scope, perhaps frictionless versus
      k > 0 cases. C88 versus C162: the environment assumes full transparency about
      the automation-demand mapping, but αi is not observable or contractible among
      firms. C111 versus C158: automation is called a strictly dominant strategy so
      no non-binding agreement can restore efficiency, yet a coalition that maximizes
      joint profits would choose lower automation; the paper''s likely reconciliation
      is that such a coalition is not self-enforcing. C176 versus C134: wage insurance
      is presented both as a way to raise η and as a potential source of moral hazard
      that could weaken retraining.


      What a fair referee should watch. Separate three layers: first, the internal
      theorem inside the baseline model; second, robustness of the theorem to richer
      assumptions such as AI productivity φ, owner spending, capital-income recycling,
      endogenous wages, and task heterogeneity; third, the empirical claim that current
      AI is actually creating a large enough demand-loss parameter ℓ to matter. The
      paper is strongest as a formal mechanism showing how a multilateral product-market
      externality could produce an automation arms race. It is weaker where it generalizes
      to real-world policy uniqueness and where internal empirical claims about history,
      reabsorption, and productivity are in tension.


      Useful referee questions. Are C6-C12 intended as within-model propositions or
      broad real-world claims? Does the main welfare result survive once lower prices
      and productivity gains expand real purchasing power? How empirically plausible
      are λ, η, η̂, and the assumption of MPC asymmetry large enough to make ℓ substantial?
      If αi is noncontractible and hard to observe, how administrable is τ* in practice?
      Is the appropriate policy conclusion direct taxation of automated tasks, or
      some combination of redistribution and adaptation that changes η, A, or bargaining
      conditions? These questions let neutral agents fairly evaluate both the theory''s
      structural insight and the skeptic''s claim that it overstates persistence,
